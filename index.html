<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./public/css/output.css" />
    <title>Code Card Generator</title>
  </head>
  <body class="min-h-screen bg-zinc-950 text-white">
    <div class="container mx-auto px-4 py-10">
      <h1 class="mb-8 text-center text-4xl font-bold">Code Card Generator</h1>

      <div class="grid gap-8 lg:grid-cols-2">
        <!-- FORM -->
        <div class="space-y-5 rounded-2xl bg-zinc-900 p-6">
          <div>
            <label class="mb-2 block text-sm font-medium">
              Profile Picture
            </label>

            <input
              id="avatarInput"
              type="file"
              accept="image/*"
              class="w-full rounded-lg border border-zinc-700 p-2"
            />
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium"> Username </label>

            <input
              id="usernameInput"
              type="text"
              placeholder="john_doe"
              class="w-full rounded-lg border border-zinc-700 bg-zinc-800 p-3 outline-none focus:border-blue-500"
            />
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium"> Content </label>

            <textarea
              id="contentInput"
              rows="4"
              placeholder="Your programming tip..."
              class="w-full rounded-lg border border-zinc-700 bg-zinc-800 p-3 outline-none focus:border-blue-500"
            ></textarea>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium"> Code </label>

            <textarea
              id="codeInput"
              rows="8"
              placeholder="const hello = 'world'"
              class="w-full rounded-lg border border-zinc-700 bg-zinc-800 p-3 font-mono outline-none focus:border-blue-500"
            ></textarea>
          </div>

          <button
            id="downloadBtn"
            class="w-full rounded-lg bg-blue-600 px-4 py-3 font-semibold transition hover:bg-blue-700"
          >
            Download PNG
          </button>
        </div>

        <!-- PREVIEW -->
        <div class="flex justify-center">
          <div
            id="card"
            class="w-full max-w-xl rounded-3xl border border-zinc-800 bg-zinc-900 p-6 shadow-2xl"
          >
            <div class="mb-5 flex items-center gap-3">
              <img
                id="previewAvatar"
                src="https://placehold.co/100"
                alt="avatar"
                class="h-12 w-12 rounded-full object-cover"
              />

              <div>
                <h3 id="previewUsername" class="font-semibold">username</h3>
              </div>
            </div>

            <p id="previewContent" class="mb-5 text-zinc-200">
              Your content appears here...
            </p>

            <div class="overflow-x-auto rounded-xl bg-zinc-950 p-4">
              <pre>
<code
id="previewCode"
class="font-mono text-sm text-green-400"
>
const hello = "world";
</code>
            </pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
